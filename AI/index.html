<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewrite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rewrite</h1>

        <div class="input-section">
            <input type="text" id="url-input" placeholder="Paste an NPR article URL here...">
            
            <select id="lens-select">
                <option value="" disabled selected>Select a lens...</option>
                <option value="agitate">Agitate</option>
                <option value="comfort">Comfort</option>
                <option value="suppress">Suppress</option>
            </select>

            <button id="submit-btn" disabled>Rewrite</button>
        </div>

        <div id="loading" class="loading hidden">
            <p>Rewriting...</p>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="output" class="output hidden">
            <div id="output-image-container" class="output-image-container hidden">
                <img id="output-image" src="" alt="Generated article image">
            </div>
            <h2 id="output-headline"></h2>
            <p id="output-subtitle" class="output-subtitle"></p>
            <p id="output-meta" class="output-meta"></p>
            <div id="output-body" class="output-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
